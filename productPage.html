<!DOCTYPE html> <!-- Coded by APR-->
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" 
                content="width=device-width, initial-scale=1.0">
        <meta name="description"
                content="">

        <!--looking to including meta open graph tags. they format preview on links posted to other platforms-->

        <title id="page-title"></title>

        <link rel="icon" type="image/png" href="images/rj-favicon.png">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap">
        <style>
            #productContainer{
                width:90%;
                margin-right: auto;
                margin-left: auto;               
            }
            #productInfo{
                display: grid;
                grid-template-columns: 500px 1fr;
                grid-template-rows: auto 1fr;
                grid-template-areas: 
                    "image title"
                    "image info";
                align-items: start;
            }
            #image{
                aspect-ratio: 1/1;
                width: fit-content;
                height: 500px;
                border: 1px black dashed;
                align-content: center;
                grid-area: image;
            }
            #productImg{
                object-fit: contain;  
                width: 100%;               
                height: 100%;
            }
            #productName{
                border-bottom: 1px black dashed;
                padding-bottom: 5px;
                grid-area: title;
            }
            #productStatus{
                margin-top: 100px;
            }
            #namePrice, #productName{
                margin-left: 50px;
                margin-top: 0px;
                width: 90%;
            }
            #namePrice{
                grid-area: info;
            }
            #descriptionScroll{
                max-height: 200px;
                padding: 10px;
                padding-top: 0px;
                overflow-y: auto;
                border-bottom: 2px black dotted;
                border-top: 2px black dotted;
            }
            #priceDiv h3{
                color: gray;
            }
            #imgBar{
                display: flex;
                text-align: center;
                height: 60px;
            }
            #imgLibrary{
                display: flex;
                margin-right:auto; margin-left: auto;
                height: 100%;
                width: 200px;
                overflow: hidden;                
            }
            #imgLibrary img{
                width: 60px;
                height: 60px;               
            }
            #imgTrack{
                gap: 10px;
                display: flex;
                transition: transform 0.7s ease-in-out;
                margin-left: auto;
                margin-right: auto;
            }
            #imgTrack img{
                cursor: pointer;
                width: 60px;
                height: 60px;

                flex: 0 0 auto;

                object-fit: contain;
                
            }
            
            .arrow{
                cursor: pointer;
                align-self: center;
                border-radius: 360px;

                text-align: center;
                align-content: center;

                margin: 10px;

                width: 40px; height: 40px;
                
                background: lightgray;
                color:whitesmoke;

                font-size: 20pt;
                user-select: none;
            }
            .arrow:hover{
                background: gray;              
            }
            @media screen and (max-width: 500px) {
                #productContairner{
                    display: flex;
                }
                #productInfo{
                    grid-template-columns: 1fr;
                    grid-template-areas: 
                        "title"
                        "image"
                        "info";
                }
                #image{
                    height: 350px;
                }

                #productName{
                    border-bottom: 1px black dashed;
                    padding-bottom: 5px;
                    margin-left: 0px;
                    width: 100%;
                }
                #namePrice{
                    margin-left: 0px;
                    margin-top: 50px;
                    width: 100%;
                }
                #descriptionScroll{
                    max-height: 200px;
                    padding: 10px;
                    padding-top: 0px;
                    overflow-y: auto;
                    border-bottom: 2px black dotted;
                    border-top: 2px black dotted;
                }
                #productStatus{
                    margin-top: 50px;
                }
                #imgBar{
                    display: flex;
                    text-align: center;
                    height: 60px;
                }
                #imgLibrary{
                    display: flex;
                    width: 200px;             
                }
                #imgLibrary img{
                    width: 60px;
                    height: 60px;               
                }
                #imgTrack{
                    gap: 10px;
                }
                #imgTrack img{
                    cursor: pointer;
                    width: 60px;
                    height: 60px;

                    flex: 0 0 auto;

                    object-fit: contain;                   
                }
                
                .arrow{
                    margin: 10px;

                    width: 40px; height: 40px;               

                    font-size: 20pt;
                }
            }
        </style>
    </head>
    <body>
        <div class="mainContainer">
            <div id="header-placeholder"></div>
            <div id="subheader">
                <div id="tree-bar"></div>
            </div> <!-- end subheader-->
            <div id="productContainer">
                <div id="productInfo">
                    <div id="name">
                        <h1 id="productName"></h1>
                    </div>
                    <div id="image"> 
                        <img id="productImg" src="" onerror="this.src='images/img-placeholder.svg'">
                        <div id="imgBar"></div>
                    </div>
                    <div id="namePrice">
                        <h3>Description:</h3>                   
                        <div>
                            <p id="descriptionScroll"></p>
                        </div>
                        
                        <div id="priceDiv"></div>
                    </div>
                </div>
                <div id="productStatus">
                    <h3 id="itemID"></h3>
                    <br>
                    <h3 id="availibility"></h3>
                    <h3 id="quantity"></h3>
                </div>
            </div>
            <div class="featured"> <!-- featured -->
                <h2 id="featured-title"> Featured Selection </h2>
                <div id="featured-content"></div>              
            </div>

            <div id="footer-placeholder"></div>
        </div><!--end main container-->
    </body>
    <script src="main.js"></script> <!--loads main.js-->
    <script>
        (async function(){
            await initializePage();
            await initializeProductPage();
        })();
    </script>
</html>
